apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: vortex-client-ingress
  namespace: vortex-client
  labels:
    app: vortex-client
    tier: frontend
  annotations:
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    nginx.ingress.kubernetes.io/proxy-body-size: "10m"
    nginx.ingress.kubernetes.io/browserXSSFilter: "true"
    nginx.ingress.kubernetes.io/enableRewrite: "false"
    nginx.ingress.kubernetes.io/proxy-buffer-size: "32k"
    nginx.ingress.kubernetes.io/use-regex: "false"
    cert-manager.io/cluster-issuer: "letsencrypt-prod"
spec:
  ingressClassName: nginx
  tls:
    - hosts:
        - vortex.example.com
      secretName: vortex-client-tls
  rules:
    - host: vortex.example.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: vortex-client
                port:
                  number: 80
